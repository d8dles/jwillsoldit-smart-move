<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Inventory Detail | JWillSoldIt Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=Libre+Franklin:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/base.css">
<link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="admin-body" data-page="inventory">
<header class="admin-topbar">
  <a class="admin-brand" href="https://www.jwillsoldit.com/"><span class="jw-logo">JWillSoldIt</span><span class="tag">Inventory</span></a>
  <nav class="admin-nav">
    <a href="/admin/verifications" data-nav="list">Verifications</a>
    <a href="/admin/invoices" data-nav="invoices">Invoices</a>
    <a href="/admin/listings" data-nav="listings">Listing Files</a>
    <a href="/admin/inventory" data-nav="inventory">Public Inventory</a>
    <a href="/admin/inventory/new" data-nav="inventory-new">New Inventory</a>
    <button class="link-btn" id="admin-logout" type="button">Log Out</button>
  </nav>
</header>

<main class="admin-shell">
  <div id="inventory-loading" class="empty-state">Loading inventory record…</div>
  <div id="inventory-state" style="display:none;">
    <div class="admin-header-row">
      <div><div class="admin-kicker">Public Inventory</div><h1 class="admin-h1" id="inventory-title">—</h1><p class="admin-sub" id="inventory-sub"></p></div>
      <span class="badge" id="inventory-badge">—</span>
    </div>
    <div id="inventory-error" class="form-error"></div>
    <div class="admin-card">
      <div class="admin-grid-2">
        <div class="admin-field"><label for="offeringType">Offering Type</label><select id="offeringType"><option value="rental">Rental</option><option value="stay">Short-term stay</option><option value="sale">For sale</option></select></div>
        <div class="admin-field"><label for="rentalMode">Rental Mode</label><select id="rentalMode"><option value="long_term">Long-term</option><option value="mid_term">Furnished / mid-term</option><option value="short_term">Short-term</option></select></div>
        <div class="admin-field"><label for="slug">Public Slug</label><input id="slug"></div>
        <div class="admin-field"><label for="publicPath">Public Path</label><input id="publicPath"></div>
        <div class="admin-field"><label for="publicStatus">Public Status</label><select id="publicStatus"></select></div>
        <div class="admin-field"><label for="priceLabel">Price Display</label><input id="priceLabel"></div>
      </div>
      <label class="admin-checkbox-inline"><input type="checkbox" id="published"> Published on public site</label>
    </div>
    <div class="admin-card">
      <h2>Property Details</h2>
      <div class="admin-grid-2">
        <div class="admin-field"><label for="title">Public Title</label><input id="title"></div>
        <div class="admin-field"><label for="addressLine">Address</label><input id="addressLine"></div>
        <div class="admin-field"><label for="neighborhood">Neighborhood</label><input id="neighborhood"></div>
        <div class="admin-field"><label for="city">City</label><input id="city"></div>
        <div class="admin-field"><label for="state">State</label><input id="state"></div>
        <div class="admin-field"><label for="zip">ZIP</label><input id="zip"></div>
        <div class="admin-field"><label for="bedrooms">Bedrooms</label><input id="bedrooms" type="number" min="0"></div>
        <div class="admin-field"><label for="bathrooms">Bathrooms</label><input id="bathrooms" type="number" min="0" step="0.5"></div>
        <div class="admin-field"><label for="squareFeet">Square Feet</label><input id="squareFeet" type="number" min="0"></div>
        <div class="admin-field"><label for="lotSquareFeet">Lot Square Feet</label><input id="lotSquareFeet" type="number" min="0"></div>
        <div class="admin-field"><label for="yearBuilt">Year Built</label><input id="yearBuilt" type="number" min="1800"></div>
        <div class="admin-field"><label for="stories">Stories</label><input id="stories" type="number" min="1"></div>
        <div class="admin-field"><label for="garage">Garage</label><input id="garage"></div>
        <div class="admin-field"><label for="fullBathrooms">Full Bathrooms</label><input id="fullBathrooms" type="number" min="0" step="1"></div>
        <div class="admin-field"><label for="halfBathrooms">Half Bathrooms</label><input id="halfBathrooms" type="number" min="0" step="1"></div>
        <div class="admin-field"><label for="heroImageUrl">Hero Image URL</label><input id="heroImageUrl" type="url"></div>
        <div class="admin-field"><label for="heroImageAlt">Hero Image Alt Text</label><input id="heroImageAlt"></div>
        <div class="admin-field"><label for="mlsUrl">MLS / Channel URL</label><input id="mlsUrl" type="url"></div>
        <div class="admin-field"><label for="inquiryUrl">Inquiry URL</label><input id="inquiryUrl" type="url"></div>
      </div>
      <div class="admin-field"><label for="description">Public Description</label><textarea id="description"></textarea></div>
      <div class="admin-field"><label for="features">Features</label><textarea id="features"></textarea></div>
    </div>
    <div class="admin-card">
      <div class="admin-card-head"><div><h2>Photo Gallery</h2><p class="admin-card-note">Add, remove, and reorder photos. Alt text is required before publishing.</p></div><button class="admin-btn ghost small" type="button" id="add-gallery-photo">+ Add photo</button></div>
      <div id="gallery-list" data-gallery-list></div>
    </div>
    <div class="admin-card" id="stay-card" style="display:none;"><h2>Stay Details</h2><div class="admin-grid-2"><div class="admin-field"><label for="ratePeriod">Rate Period</label><select id="ratePeriod"><option value="night">Per night</option><option value="week">Per week</option><option value="month">Per month</option></select></div><div class="admin-field"><label for="minimumStay">Minimum Stay</label><input id="minimumStay" type="number" min="1"></div><div class="admin-field"><label for="maxGuests">Max Guests</label><input id="maxGuests" type="number" min="1"></div><div class="admin-field"><label for="bookingUrl">Booking / Inquiry URL</label><input id="bookingUrl" type="url"></div><div class="admin-field"><label for="availabilityStart">Available From</label><input id="availabilityStart" type="date"></div><div class="admin-field"><label for="availabilityEnd">Available Through</label><input id="availabilityEnd" type="date"></div></div><div class="admin-field"><label for="amenities">Amenities</label><textarea id="amenities"></textarea></div><div class="admin-field"><label for="houseRules">House Rules</label><textarea id="houseRules"></textarea></div></div>
    <div class="admin-card"><div class="admin-field"><label for="internalNotes">Internal Notes</label><textarea id="internalNotes"></textarea></div><div style="display:flex;gap:10px;flex-wrap:wrap;"><button class="admin-btn primary" id="save-inventory" type="button">Save Changes</button><a class="admin-btn ghost" id="view-public" href="#" target="_blank" rel="noopener">View Public Page ↗</a><button class="admin-btn" id="archive-inventory" type="button">Archive Property</button><button class="admin-btn forest" id="restore-inventory" type="button" style="display:none;">Restore Property</button></div></div>
  </div>
</main>

<script src="/assets/js/admin-shell.js"></script>
<script type="module" src="/assets/js/admin-inventory-detail.js"></script>
<script src="/assets/js/brand-footer.js"></script>
</body>
</html>
