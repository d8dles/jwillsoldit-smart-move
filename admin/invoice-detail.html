<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice | JWillSoldIt Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=Libre+Franklin:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/base.css">
<link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="admin-body" data-page="list">
<header class="admin-topbar">
  <div class="admin-brand"><span>JWillSoldIt</span><span class="tag">Rental Verification</span></div>
  <nav class="admin-nav">
    <a href="/admin/verifications" data-nav="list">Verifications</a>
    <a href="/admin/verifications/new" data-nav="new">New File</a>
    <button class="link-btn" id="admin-logout" type="button">Log Out</button>
  </nav>
</header>

<main class="admin-shell">
  <div id="inv-loading" class="empty-state">Loading invoice…</div>

  <div id="inv-content" style="display:none;">
    <div class="admin-header-row">
      <div>
        <div class="admin-kicker" id="inv-back">&larr; Verification File</div>
        <h1 class="admin-h1">Invoice <span id="inv-number">—</span></h1>
        <p class="admin-sub" id="inv-sub"></p>
      </div>
      <span class="badge" id="inv-status-badge"></span>
    </div>

    <div id="inv-error" class="form-error"></div>

    <div class="admin-card">
      <div class="admin-card-head">
        <h2>Invoice-Ready Fields</h2>
        <span class="admin-card-note" id="inv-lock-note" style="margin:0;"></span>
      </div>
      <form id="inv-form">
        <div class="admin-grid-2" id="inv-fields"></div>
        <button type="submit" class="admin-btn primary small" id="inv-save" style="margin-top:8px;">Save Draft</button>
      </form>
    </div>

    <div class="admin-card">
      <h2 style="margin-bottom:16px;">Workflow</h2>
      <p class="admin-card-note">No invoice is ever sent automatically. Each step below requires you to click it.</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;">
        <button class="admin-btn forest" id="btn-approve" type="button">Approve Invoice</button>
        <button class="admin-btn primary" id="btn-send" type="button">Send Invoice</button>
        <button class="admin-btn forest" id="btn-paid" type="button">Mark Paid</button>
        <a class="admin-btn ghost" id="btn-export" href="#">Export JSON</a>
      </div>
    </div>

    <div class="admin-card">
      <h2 style="margin-bottom:16px;">Related Activity</h2>
      <ul class="audit-log" id="inv-audit"></ul>
    </div>
  </div>
</main>

<script src="/assets/js/admin-shell.js"></script>
<script src="/assets/js/admin-invoice.js"></script>
</body>
</html>
