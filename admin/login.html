<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    background: var(--pure);
    border: 1px solid var(--trace);
    border-radius: var(--radius);
    padding: 36px 32px;
  }
</style>
</head>
<body class="admin-body">
<div class="login-wrap">
  <div class="login-card">
    <div class="admin-kicker"><a class="jw-logo" href="https://www.jwillsoldit.com/">JWILLSOLDIT<span class="jw-logo__dot" aria-hidden="true">.</span></a> · Internal</div>
    <h1 class="admin-h1">Rental Verification Admin</h1>
    <p class="admin-sub" style="margin-bottom:24px;">Sign in to manage verification files, links, and invoices.</p>
    <div id="login-error" class="form-error"></div>
    <form id="login-form" novalidate>
      <div class="admin-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="admin-btn primary" style="width:100%;" id="login-submit">Sign In</button>
    </form>
    <form id="code-form" style="display:none;" novalidate>
      <p class="admin-sub" style="margin-bottom:18px;">A 6-digit code was emailed to your admin address. It expires in 10 minutes.</p>
      <div class="admin-field">
        <label for="code">Verification Code</label>
        <input type="text" id="code" name="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required>
      </div>
      <button type="submit" class="admin-btn primary" style="width:100%;" id="code-submit">Verify</button>
      <button type="button" class="admin-btn ghost small" id="code-restart" style="width:100%;margin-top:10px;">Start Over</button>
    </form>
  </div>
</div>
<script src="/assets/js/admin-shell.js"></script>
<script src="/assets/js/admin-login.js"></script>
<script src="/assets/js/brand-footer.js"></script>
</body>
