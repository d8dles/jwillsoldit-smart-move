<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | JWillSoldIt</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=Libre+Franklin:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/base.css">
<link rel="stylesheet" href="/assets/css/admin.css">
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    background: var(--pure);
    border: 1px solid var(--trace);
    border-radius: var(--radius);
    padding: 36px 32px;
  }
</style>
</head>
<body class="admin-body">
<div class="login-wrap">
  <div class="login-card">
    <div class="admin-kicker">JWillSoldIt · Internal</div>
    <h1 class="admin-h1">Rental Verification Admin</h1>
    <p class="admin-sub" style="margin-bottom:24px;">Sign in to manage verification files, links, and invoices.</p>
    <div id="login-error" class="form-error"></div>
    <form id="login-form">
      <div class="admin-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="admin-btn primary" style="width:100%;" id="login-submit">Sign In</button>
    </form>
  </div>
</div>
<script src="/assets/js/admin-shell.js"></script>
<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-submit');
    const errorBox = document.getElementById('login-error');
    errorBox.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: document.getElementById('password').value }),
      });
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error || 'Sign-in failed');
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('next') || '/admin/verifications';
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
